<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ถึงไอรีน ❤️</title>

<style>
html,
body,
#content,
.card{
    max-width:100%;
}

img{
    max-width:100%;
    height:auto;
}    

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow-x:hidden;
    min-height:100vh;
    padding:10px;

    background:
        linear-gradient(
            rgba(255,154,158,0.75),
            rgba(250,208,196,0.75)
        ),
        url("My Melody.Png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:scroll;
}

.card{
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(8px);

    width: 100%;
    max-width: 900px;
    margin: auto;

    padding: 20px;
    overflow: hidden;
    border-radius: 25px;
    text-align: center;
}

.main-img{
    width:220px;
    max-width:90%;
    height:auto;
}

h1{
    color:#ff3366;
    margin-bottom:15px;
}

#msg{
    font-size:18px;
    line-height:1.8;
    color:#444;
    margin-bottom:20px;

    word-wrap:break-word;
    overflow-wrap:anywhere;
    word-break:break-word;
}

button{
    padding:14px 30px;
    border:none;
    border-radius:12px;
    background:#ff3366;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#gallery{
    display:none;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
    justify-items:center;
    width:100%;
}

#gallery img{
    width:100%;
    max-width:120px;
    height:auto;
    object-fit:contain;

    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

    opacity:0;
    transform:translateY(20px);

    transition:
        opacity 1s ease,
        transform 1s ease;
}

.gallery-show{
    opacity:1 !important;
    transform:translateY(0) !important;
}


.main-img{
    width:220px;
    max-width:90%;
    height:auto;
}

    #gallery{
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

    #gallery img{
    width:100%;
    height:auto;
}

#gallery img:hover{
    transform:translateY(0) scale(1.05);
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:14px;
}

#content{
    word-wrap:break-word;
    overflow-wrap:break-word;
    display:none;
    opacity:1;
    transition:opacity 1.5s ease;
}

.heart{
    position:fixed;
    color:#ff3366;
    font-size:20px;
    animation:floatUp 5s linear forwards;
    pointer-events:none;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:1;
    }
    100%{
        transform:translateY(-100vh);
        opacity:0;
    }
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.show{
    animation:fadeIn 1.5s ease forwards;
}
@keyframes fadeInCard{
    from{
        opacity:0;
        transform:scale(0.95) translateY(20px);
    }
    to{
        opacity:1;
        transform:scale(1) translateY(0);
    }
}
.melody-bg{
    position:fixed;
    width:80px;
    opacity:0.12;
    z-index:-1;
    pointer-events:none;
}



.melody-bg{
    position:fixed;
    width:80px;
    opacity:0.12;
    z-index:-1;
    pointer-events:none;
    animation:floatMelody 4s ease-in-out infinite;
}
@media (max-width:768px){

    body{
        padding:10px;
    }

    .card{
        width:80%;
        padding:15px;
    }

    #gallery{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:8px;
    }

    #gallery img{
        width:100%;
        height:auto;
    }
}

</style>
</head>
<body>

<div id="letter">

<h1>💌</h1>
<h2>มีข้อความถึงไอรีน</h2>

<button onclick="openLetter()">
เปิดจดหมาย
</button>

</div>

<div id="content" style="display:none;">

<div class="card">

<img src="(1)irene.jpg" class="main-img" id="slider">

<h1> ถึงไอรีนหมูเด้งของลีโอ </h1>

<p id="msg">
กดตรงนี้ไอหมูอ้วน 
</p>

<button onclick="showMsg()">
อ่านข้อความ
</button>

<div id="gallery">

    <img src="(2)irene.jpg">
    <img src="(3)irene.jpg">
    <img src="(4)irene.jpg">

</div>

<div class="footer">
สร้างโดยคนที่รักเธอที่สุด
</div>

</div>

</div>

<script>

function openLetter(){

    document.getElementById("letter").style.display = "none";

    const content = document.getElementById("content");

    content.style.display = "block";
    content.classList.add("show");

    document.getElementById("music").play();

}

function showMsg(){

    const text =
    "เธอเค้าคิดถึงมากเลยตอนที่เธอทิ้งเค้าไปเค้าได้ลองใช้ชีวิตแบบไม่มีเธอแล้วมันเจ็บมากเลยตอนอ้วนไม่อยู่แล้วได้เห็นอ้วนกับคนใหม่อีก มันไม่ง่ายเลย ตกดึกทีไรมันคิดถึงเธอมากๆ คิดว่าปกติต้องมีเสียงอ้วนๆของหนูแล้วก็มีหนังอีกหลายเรื่องที่เค้าไม่ได้ดูกับเธอเลยถ้ากลับมาเรามาดูหนังด้วยกันอีกนะ หนูช่วยกลับมาหาเค้าได้มั้ย ❤️";

    let i = 0;

    const msg = document.getElementById("msg");

    msg.textContent = "";

   const typing = setInterval(() => {

    msg.textContent = text.slice(0, i + 1);

    i++;

    if(i >= text.length){

    clearInterval(typing);

    const gallery =
        document.getElementById("gallery");

    gallery.style.display = "grid";

    const imgs = document.querySelectorAll("#gallery img");

    imgs.forEach((img,index)=>{

    setTimeout(()=>{

        img.classList.add("gallery-show");

    }, index * 500);

});

}
},40);

}

setInterval(createHeart, 500);

function createHeart(){

    const heart = document.createElement("div");

    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left =
        Math.random() * (window.innerWidth - 50) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);

}
const photos = [
    "(1)irene.jpg",
    "(2)irene.jpg",
    "(3)irene.jpg",
    "(4)irene.jpg"
];

let current = 0;

setInterval(() => {

    current++;

    if(current >= photos.length){
        current = 0;
    }

    document.getElementById("slider").src =
        photos[current];

},3000);



</script>

<audio id="music" loop>
    <source src="Irene.mp3.mp3" type="audio/mpeg">
</audio>

</body>
</html>
